name: Configuración final CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas
        shell: powershell
        run: |
          pytest

      - name: Construir imagen Docker
        shell: powershell
        run: |
          docker build -t devops-app .

      - name: Verificar Trivy
        shell: powershell
        run: |
          trivy --version

      - name: Escanear imagen Docker
        shell: powershell
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL devops-app

      - name: Verificar SonarScanner
        shell: powershell
        run: |
          sonar-scanner -v

      - name: Ejecutar análisis SonarQube
        shell: powershell
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $env:SONAR_HOST_URL="${{ secrets.SONAR_HOST_URL }}"
          $env:SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}"
          sonar-scanner